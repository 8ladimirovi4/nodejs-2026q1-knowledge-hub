services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - knowledge-hub-net
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:${PORT:-4000}/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - knowledge-hub-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    profiles:
      - debug
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - knowledge-hub-net
    depends_on:
      db:
        condition: service_healthy

networks:
  knowledge-hub-net:
    driver: bridge

volumes:
  postgres_data:
